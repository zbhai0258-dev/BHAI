name: Sync to Hugging Face Hub

on:
  push:
    branches: [main] # Triggers when you push to main
  workflow_dispatch: # Allows you to run it manually

jobs:
  sync-to-hub:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
        with:
          fetch-depth: 0
          lfs: true
          
      - name: Push to Hugging Face
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        # Replace YOUR_HF_USERNAME and YOUR_SPACE_NAME below
        run: git push --force https://YOUR_HF_USERNAME:$HF_TOKEN@huggingface.co/spaces/YOUR_HF_USERNAME/YOUR_SPACE_NAME main
